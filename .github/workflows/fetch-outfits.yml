# Relay for generated artwork: the CI runner (which has open egress)
# downloads generated outfit images, optimizes them, and commits them to
# the branch it was dispatched on. Dispatched via the GitHub API with a
# JSON manifest of {file, url} pairs.
name: Fetch outfit assets

on:
  workflow_dispatch:
    inputs:
      manifest:
        description: 'JSON array of {"file": "name.jpg", "url": "https://..."}'
        required: true
        type: string

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ImageMagick
        run: sudo apt-get update -qq && sudo apt-get install -y -qq imagemagick

      - name: Download and optimize
        env:
          MANIFEST: ${{ inputs.manifest }}
        run: |
          printf '%s' "$MANIFEST" > /tmp/manifest.json
          jq -c '.[]' /tmp/manifest.json | while read -r item; do
            file=$(jq -r '.file' <<<"$item")
            url=$(jq -r '.url' <<<"$item")
            width=$(jq -r '.width // 720' <<<"$item")
            path=$(jq -r '.path // ("assets/outfits/" + .file)' <<<"$item")
            echo "fetching $path (${width}px)"
            mkdir -p "$(dirname "$path")"
            case "$path" in
              *.mp4|*.webm)
                curl -sSL "$url" -o "$path"
                ;;
              *)
                curl -sSL "$url" -o /tmp/src.img
                convert /tmp/src.img -resize "${width}x" -background black -flatten -strip -quality 82 "$path"
                ;;
            esac
          done

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets
          git commit -m "Add generated imagery" || echo "nothing to commit"
          git push
